apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:
      - name: flask-app
        image: ramveer1999/aws-mock-app:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 5000
